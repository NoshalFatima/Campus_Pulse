<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The essential campus connection app">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="campus_pulse">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>campus_pulse</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- ✅ OneSignal Web SDK v16 -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    OneSignalDeferred.push(async function(OneSignal) {
      console.log("✅ OneSignal: Initializing on Web...");

      await OneSignal.init({
        appId                    : "02b5177a-5147-456c-aa7b-08912068cc01",
        allowLocalhostAsSecureOrigin: true,
        notifyButton             : { enable: true },
        // ✅ Prompt user for permission on first visit
        promptOptions: {
          slidedown: {
            prompts: [{
              type    : "push",
              autoPrompt: true,
              text    : {
                actionMessage         : "Campus Pulse wants to send you notifications for announcements and messages.",
                acceptButton          : "Allow",
                cancelButton          : "No Thanks",
              },
            }]
          }
        }
      });

      console.log("✅ OneSignal Web initialized!");

      // ✅ BRIDGE: Flutter Dart code yeh function call karega login ke baad
      // OneSignalService.loginUser() web pe yeh trigger karta hai
      window.oneSignalWebLogin = async function(firebaseUid) {
        try {
          await OneSignal.login(firebaseUid);
          console.log("✅ OneSignal Web login: uid=" + firebaseUid);

          // Sub ID read karo aur Flutter ko pass karo
          const subId = OneSignal.User.PushSubscription.id;
          if (subId) {
            console.log("✅ OneSignal Web subId: " + subId);
            // Flutter ka dart:js bridge use karta hai — yeh window pe store karo
            window._osWebSubId = subId;
          }
        } catch(e) {
          console.error("❌ OneSignal Web login error:", e);
        }
      };

      window.oneSignalWebLogout = async function() {
        try {
          await OneSignal.logout();
          console.log("✅ OneSignal Web logout");
        } catch(e) {
          console.error("❌ OneSignal Web logout:", e);
        }
      };
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
