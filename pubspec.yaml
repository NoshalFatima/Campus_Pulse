name: campus_pulse
description: "The essential campus connection app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

  
dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0 # To detect internet status
  flutter_launcher_icons: ^0.13.1
  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  permission_handler: ^11.3.1
  dio: ^5.4.1
  flutter_local_notifications: ^17.0.0
  image: ^4.0.0
  js: ^0.6.7
  flutter_svg: ^2.0.9
  onesignal_flutter: ^5.5.1
  # --- Firebase & Auth ---
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.3.1
  firebase_database: ^11.1.1
  firebase_messaging: ^15.2.1
  firebase_analytics: ^11.3.1
  firebase_crashlytics: ^4.2.1
  universal_html: ^2.3.0
  url_launcher: ^6.3.1
  
  # --- Machine Learning & Face Detection ---
  google_mlkit_face_detection: ^0.11.0
  googleapis_auth: ^1.4.1
  # --- Camera, Location & Media ---
  camera: ^0.11.0+2
  geolocator: ^13.0.1
  cached_network_image: ^3.4.1
  cloudinary_public: ^0.23.1
  path_provider: ^2.1.3
  http: ^1.2.1
  image_picker: ^1.1.0
  mask_text_input_formatter: ^2.5.0
  # --- PDF & UI Elements ---
  pdf: ^3.11.1
  printing: ^5.13.2
  smooth_page_indicator: ^1.1.0 # ViewPager2 replacement
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  flutter_native_splash: ^2.4.0
  tflite_flutter: ^0.11.0
  flutter_dotenv: ^6.0.1
 
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  # --- Assets Section (Logo aur Models ke liye) ---
  assets:
    - assets/logo1.jpeg
    - assets/logo.jpeg
    - assets/models/mobilefacenet.tflite
    - assets/profile.png
    #- assets/service-account.json
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.jpeg" # Aapke logo ka path
  web:
    generate: true
    image_path: "assets/logo.jpeg"
    background_color: "#FDF7F7"
    theme_color: "#8B0A1A"
flutter_native_splash:
  color: "#FFFFFF"               # Splash screen ka background color
  image: "assets/logo.jpeg"       # Aapka logo path
  android: true
  ios: true
  web: false                     # Web par splash screen zaroori nahi hoti